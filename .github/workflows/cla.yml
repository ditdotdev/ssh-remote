#
# CLA Assistant: requires every pull-request author to have signed the Dit
# Individual Contributor License Agreement before the check goes green.
#
# The CLA text lives at https://github.com/ditdotdev/cla/blob/master/CLA.md
# and signatures are recorded org-wide in ditdotdev/cla (signatures/version1/
# cla.json), so a contributor signs once and is covered on every Dit repo.
# Contributors sign by commenting on the PR:
#
#   I have read the CLA Document and I hereby sign the CLA
#
# SECURITY NOTE: this workflow runs on pull_request_target, which executes
# with repository secrets. It must never check out or execute code from the
# incoming pull request.
#
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Signature Check
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Org PAT (same one used for private Go modules); must have
          # contents write access to ditdotdev/cla for signature commits.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
        with:
          remote-organization-name: ditdotdev
          remote-repository-name: cla
          branch: master
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/ditdotdev/cla/blob/master/CLA.md
          allowlist: dependabot[bot],github-actions[bot]
          lock-pullrequest-aftermerge: false
