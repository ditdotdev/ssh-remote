name: Repo Health

on:
  push:
    branches: [master]
  pull_request:
    branches: [master, main]

jobs:
  health:
    uses: datadatdat/.github/.github/workflows/repo-health.yml@master
    with:
      language: kotlin
      coverage-floor: 90
      max-cyclomatic: 25
      mode: block
    secrets:
      GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
