#
# On creating a new tag, we publish our maven artifacts to the Datadatdat maven bucket.
#
name: Release

on: create

permissions:
  contents: read
  pull-requests: write

jobs:
  health:
    uses: datadatdat/.github/.github/workflows/repo-health.yml@master
    with:
      language: kotlin
      coverage-floor: 90
      mode: block
    secrets:
      GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}

  publish:
    name: Test and publish
    needs: health
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew build -Pversion=${GITHUB_REF#refs/tags/}
      - name: Publish jar
        run: >
          ./gradlew publish -PmavenBucket=${{ secrets.MAVEN_BUCKET }} -Pversion=${GITHUB_REF#refs/tags/}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
